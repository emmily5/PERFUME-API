name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Baixar dependências
        run: go mod download

      - name: Verificar formatação (go vet)
        run: go vet ./...

      - name: Rodar todos os testes
        run: go test ./... -v
